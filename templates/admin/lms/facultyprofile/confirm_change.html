{% extends "admin/base_site.html" %}
{% load i18n %}

{% block content %}
<h1>{{ title }}</h1>

<div class="warning">
    <p><strong>This action requires confirmation.</strong></p>
    <ul>
        {% for reason in request.session.confirm_reasons %}
            <li>{{ reason }}</li>
        {% endfor %}
    </ul>
</div>

<form method="post">
    {% csrf_token %}
    <input type="hidden" name="_confirmed" value="1">
    <div class="submit-row">
        <input type="submit" value="Yes, proceed" class="default">
        <a href="../change/" class="button cancel-link">Cancel</a>
    </div>
</form>
{% endblock %}
